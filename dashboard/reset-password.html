<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль | INFINITY LIFE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">INFINITY LIFE</p>
      <h1 class="auth-card__title">Создайте новый пароль</h1>
      <p class="auth-card__copy">Пароль должен быть не короче 8 символов.</p>
      <form class="auth-form" data-auth-reset>
        <label class="auth-field">
          <span>Новый пароль</span>
          <input type="password" name="password" required minlength="8" autocomplete="new-password">
        </label>
        <label class="auth-field">
          <span>Повторите пароль</span>
          <input type="password" name="passwordConfirm" required minlength="8" autocomplete="new-password">
        </label>
        <button class="auth-submit" type="submit">Сохранить пароль</button>
      </form>
      <p class="auth-message" data-auth-message></p>
      <a class="auth-link" href="/login">Вернуться ко входу</a>
    </section>
  </main>
  <script type="module" src="reset-password.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | INFINITY LIFE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">INFINITY LIFE</p>
      <h1 class="auth-card__title">Регистрация в Command Center</h1>
      <p class="auth-card__copy">Создайте аккаунт для входа в кабинет обращений и интеграций.</p>
      <form class="auth-form" data-auth-register>
        <label class="auth-field">
          <span>Email</span>
          <input type="email" name="email" required autocomplete="email">
        </label>
        <label class="auth-field">
          <span>Пароль</span>
          <input type="password" name="password" required minlength="8" autocomplete="new-password">
        </label>
        <label class="auth-field">
          <span>Повторите пароль</span>
          <input type="password" name="passwordConfirm" required minlength="8" autocomplete="new-password">
        </label>
        <button class="auth-submit" type="submit">Зарегистрироваться</button>
      </form>
      <p class="auth-message" data-auth-message></p>
      <a class="auth-link" href="/login">Уже есть аккаунт? Войти</a>
    </section>
  </main>
  <script type="module" src="register.js"></script>
</body>
</html>
